<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        /* --- THEME VARIATIONS --- */
        :root {
            /* Neon Dark (Default) */
            --bg-color: #0d0e12;
            --card-bg: #161920;
            --text-main: #ffffff;
            --text-muted: #6b7280;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --border-color: rgba(255, 255, 255, 0.05);
            --lap-bg: rgba(255, 255, 255, 0.02);
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --border-color: rgba(0, 0, 0, 0.06);
            --lap-bg: rgba(0, 0, 0, 0.02);
        }

        [data-theme="cyber"] {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-main: #38bdf8;
            --text-muted: #64748b;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --border-color: rgba(16, 185, 129, 0.2);
            --lap-bg: rgba(16, 185, 129, 0.05);
        }

        /* --- GLOBAL SETUP --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* --- TOP HEADER & THEME CONTROLS --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            opacity: 0.8;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
            background: var(--bg-color);
            padding: 4px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
        }
        .theme-btn.dark { background-color: #1e293b; }
        .theme-btn.light { background-color: #e5e7eb; border: 1px solid #d1d5db; }
        .theme-btn.cyber { background-color: #10b981; }

        .theme-btn.active::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background-color: var(--text-main);
            border-radius: 50%;
        }

        /* --- DISPLAY LAYOUT --- */
        .display-wrapper {
            text-align: center;
            margin-bottom: 45px;
            position: relative;
        }

        .time-display {
            font-size: 64px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .milliseconds {
            font-size: 32px;
            font-weight: 400;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- ACTION INTERFACES --- */
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 35px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background-color: var(--accent);
            color: #ffffff;
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-1px); opacity: 0.95; }
        .btn-primary:active { transform: translateY(1px); }

        .btn-secondary {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background-color: var(--lap-bg); }
        .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* --- LAP ARCHIVE PANEL --- */
        .laps-panel {
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            max-height: 220px;
            overflow-y: auto;
        }

        .laps-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--lap-bg);
            border-radius: 12px;
            font-size: 14px;
            animation: slideIn 0.2s ease-out forwards;
        }

        .lap-number {
            font-weight: 600;
            color: var(--text-muted);
        }

        .lap-time {
            font-family: monospace;
            font-size: 15px;
            font-weight: 500;
        }

        /* Styling scrollbar for smooth visual aesthetic */
        .laps-panel::-webkit-scrollbar { width: 4px; }
        .laps-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Simple Stopwatch</h1>
            <div class="theme-selector">
                <button class="theme-btn dark active" onclick="switchTheme('dark', this)" title="Neon Dark"></button>
                <button class="theme-btn light" onclick="switchTheme('light', this)" title="Minimal Light"></button>
                <button class="theme-btn cyber" onclick="switchTheme('cyber', this)" title="Cyber Emerald"></button>
            </div>
        </div>

        <div class="display-wrapper">
            <div class="time-display" id="mainDisplay">
                00:00:00<span class="milliseconds" id="msDisplay">.00</span>
            </div>
        </div>

        <div class="controls-wrapper">
            <button class="btn btn-secondary" id="lapResetBtn" onclick="handleSecondaryAction()" disabled>Lap</button>
            <button class="btn btn-primary" id="startPauseBtn" onclick="handlePrimaryAction()">Start</button>
        </div>

        <div class="laps-panel" id="lapsPanel" style="display: none;">
            <ul class="laps-list" id="lapsList"></ul>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let lapCount = 0;

        const mainDisplay = document.getElementById('mainDisplay');
        const msDisplay = document.getElementById('msDisplay');
        const startPauseBtn = document.getElementById('startPauseBtn');
        const lapResetBtn = document.getElementById('lapResetBtn');
        const lapsPanel = document.getElementById('lapsPanel');
        const lapsList = document.getElementById('lapsList');

        // --- PRIMARY ACTIONS: START / PAUSE ---
        function handlePrimaryAction() {
            if (!isRunning) {
                // START
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTime, 10); // Precise 10ms cycle matching centiseconds
                startPauseBtn.textContent = 'Pause';
                startPauseBtn.style.background = '#ef4444'; // Soft Alert Red on active pause state
                startPauseBtn.style.setProperty('--accent-glow', 'rgba(239, 68, 68, 0.3)');
                lapResetBtn.textContent = 'Lap';
                lapResetBtn.disabled = false;
                isRunning = true;
            } else {
                // PAUSE
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                startPauseBtn.textContent = 'Resume';
                startPauseBtn.style.background = 'var(--accent)';
                startPauseBtn.style.setProperty('--accent-glow', 'var(--accent-glow)');
                lapResetBtn.textContent = 'Reset';
                isRunning = false;
            }
        }

        // --- SECONDARY ACTIONS: LAP / RESET ---
        function handleSecondaryAction() {
            if (isRunning) {
                // RECORD LAP
                lapCount++;
                if(lapCount === 1) lapsPanel.style.display = 'block';
                
                const formattedTime = formatTimeComponents(elapsedTime);
                const li = document.createElement('li');
                li.className = 'lap-item';
                li.innerHTML = `
                    <span class="lap-number">Lap ${lapCount}</span>
                    <span class="lap-time">${formattedTime.hours}:${formattedTime.minutes}:${formattedTime.seconds}.${formattedTime.ms}</span>
                `;
                lapsList.prepend(li);
            } else {
                // RESET ARCHIVE
                clearInterval(timerInterval);
                startTime = 0;
                elapsedTime = 0;
                isRunning = false;
                lapCount = 0;
                
                mainDisplay.innerHTML = `00:00:00<span class="milliseconds" id="msDisplay">.00</span>`;
                startPauseBtn.textContent = 'Start';
                lapResetBtn.textContent = 'Lap';
                lapResetBtn.disabled = true;
                lapsList.innerHTML = '';
                lapsPanel.style.display = 'none';
            }
        }

        // --- CALCULATION LOGIC Engine ---
        function updateTime() {
            elapsedTime = Date.now() - startTime;
            const timeObj = formatTimeComponents(elapsedTime);
            
            document.getElementById('mainDisplay').innerHTML = `
                ${timeObj.hours}:${timeObj.minutes}:${timeObj.seconds}<span class="milliseconds" id="msDisplay">.${timeObj.ms}</span>
            `;
        }

        function formatTimeComponents(timeInMs) {
            let tempMs = Math.floor((timeInMs % 1000) / 10);
            let tempSec = Math.floor((timeInMs / 1000) % 60);
            let tempMin = Math.floor((timeInMs / (1000 * 60)) % 60);
            let tempHrs = Math.floor((timeInMs / (1000 * 60 * 60)) % 24);

            return {
                ms: tempMs.toString().padStart(2, '0'),
                seconds: tempSec.toString().padStart(2, '0'),
                minutes: tempMin.toString().padStart(2, '0'),
                hours: tempHrs.toString().padStart(2, '0')
            };
        }

        // --- THEME ROTATION MODULE ---
        function switchTheme(themeName, element) {
            document.documentElement.setAttribute('data-theme', themeName);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');
        }
    </script>
</body>
</html>
